<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Success Mpowered — Website Redesign Strategy</title>
<meta name="description" content="Strategic redesign pack for Success Mpowered: positioning, sitemap, copy, design direction, conversion, SEO, and team restructure.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --navy: #0E1E3F;
    --indigo: #2A2560;
    --clay: #C96A3F;
    --ivory: #F6F1E8;
    --white: #FFFFFF;
    --slate: #1B1B1E;
    --muted: #6B6E76;
    --line: #E2E0DA;
    --line-soft: #EFEDE7;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--ivory);
    color: var(--slate);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 17px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  a { color: var(--navy); text-decoration: none; border-bottom: 1px solid rgba(14,30,63,0.25); transition: border-color 0.2s, color 0.2s; }
  a:hover { color: var(--clay); border-bottom-color: var(--clay); }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    background: var(--navy);
    color: var(--ivory);
    padding: 48px 32px;
    border-right: 1px solid rgba(255,255,255,0.08);
  }

  .brand {
    margin-bottom: 48px;
  }
  .brand-mark {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 24px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--ivory);
    margin: 0 0 8px 0;
    border: none;
  }
  .brand-sub {
    font-size: 13px;
    color: rgba(246,241,232,0.6);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .nav-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(246,241,232,0.45);
    margin: 0 0 16px 0;
  }

  .nav-list {
    list-style: none;
    padding: 0;
    margin: 0 0 40px 0;
  }

  .nav-list li {
    margin-bottom: 4px;
  }

  .nav-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    border: none;
    color: rgba(246,241,232,0.85);
    font-size: 14.5px;
    line-height: 1.4;
    transition: background 0.15s, color 0.15s;
    cursor: pointer;
  }
  .nav-item:hover {
    background: rgba(255,255,255,0.06);
    color: var(--ivory);
  }
  .nav-item.active {
    background: rgba(201,106,63,0.18);
    color: var(--ivory);
    border-left: 3px solid var(--clay);
    padding-left: 9px;
  }
  .nav-num {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 13px;
    color: rgba(246,241,232,0.4);
    min-width: 22px;
  }
  .nav-item.active .nav-num { color: var(--clay); }

  .sidebar-footer {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 12.5px;
    color: rgba(246,241,232,0.5);
    line-height: 1.6;
  }
  .sidebar-footer a {
    color: rgba(246,241,232,0.75);
    border-bottom-color: rgba(246,241,232,0.25);
  }
  .sidebar-footer a:hover {
    color: var(--clay);
    border-bottom-color: var(--clay);
  }

  /* Main */
  main {
    padding: 80px 80px 120px 80px;
    max-width: 880px;
    width: 100%;
  }

  .eyebrow {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--clay);
    margin-bottom: 24px;
  }

  .content h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 52px;
    line-height: 1.08;
    letter-spacing: -0.02em;
    color: var(--navy);
    margin: 0 0 24px 0;
  }
  .content h2 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 32px;
    line-height: 1.2;
    letter-spacing: -0.015em;
    color: var(--navy);
    margin: 64px 0 20px 0;
    padding-top: 24px;
    border-top: 1px solid var(--line);
  }
  .content h3 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 24px;
    line-height: 1.25;
    color: var(--navy);
    margin: 44px 0 14px 0;
  }
  .content h4 {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    line-height: 1.4;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--indigo);
    margin: 32px 0 10px 0;
  }

  .content p {
    margin: 0 0 18px 0;
    max-width: 68ch;
  }

  .content ul, .content ol {
    margin: 0 0 22px 0;
    padding-left: 22px;
    max-width: 68ch;
  }
  .content li { margin-bottom: 8px; }
  .content li > p { margin-bottom: 6px; }

  .content hr {
    border: none;
    border-top: 1px solid var(--line);
    margin: 56px 0;
  }

  .content blockquote {
    margin: 28px 0;
    padding: 20px 26px;
    background: var(--white);
    border-left: 3px solid var(--clay);
    border-radius: 2px;
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-size: 19px;
    line-height: 1.5;
    color: var(--navy);
  }
  .content blockquote p { margin: 0 0 10px 0; }
  .content blockquote p:last-child { margin-bottom: 0; }

  .content strong { color: var(--navy); font-weight: 600; }
  .content em { color: var(--slate); }

  .content code {
    background: var(--line-soft);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 14px;
    color: var(--indigo);
  }
  .content pre {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 20px 24px;
    overflow-x: auto;
    font-size: 13.5px;
    line-height: 1.55;
    margin: 24px 0;
  }
  .content pre code {
    background: transparent;
    padding: 0;
    color: var(--slate);
    font-size: 13.5px;
  }

  .content table {
    width: 100%;
    border-collapse: collapse;
    margin: 28px 0;
    font-size: 15px;
    background: var(--white);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 1px 0 var(--line);
  }
  .content th {
    text-align: left;
    padding: 14px 18px;
    background: var(--navy);
    color: var(--ivory);
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .content td {
    padding: 14px 18px;
    border-top: 1px solid var(--line);
    vertical-align: top;
  }
  .content tr:nth-child(even) td { background: var(--ivory); }

  /* Index cards on home */
  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin: 40px 0;
  }
  .card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 28px;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    display: block;
    color: inherit;
    border-bottom: 1px solid var(--line);
  }
  .card:hover {
    border-color: var(--clay);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(14,30,63,0.08);
    color: inherit;
  }
  .card-num {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 13px;
    color: var(--clay);
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .card-title {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 22px;
    line-height: 1.22;
    color: var(--navy);
    margin: 0 0 10px 0;
  }
  .card-desc {
    font-size: 14.5px;
    line-height: 1.5;
    color: var(--muted);
    margin: 0;
  }

  /* Home hero */
  .hero {
    margin: 0 0 64px 0;
  }
  .hero-headline {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 68px;
    line-height: 1.02;
    letter-spacing: -0.025em;
    color: var(--navy);
    margin: 0 0 24px 0;
  }
  .hero-headline em {
    font-style: italic;
    color: var(--clay);
  }
  .hero-sub {
    font-size: 20px;
    line-height: 1.55;
    color: var(--muted);
    max-width: 58ch;
    margin: 0;
  }

  .meta-row {
    display: flex;
    gap: 28px;
    padding: 18px 0;
    margin: 32px 0 0 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    font-size: 13.5px;
    color: var(--muted);
  }
  .meta-row strong { color: var(--navy); font-weight: 600; }

  .pager {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    margin-top: 80px;
    padding-top: 32px;
    border-top: 1px solid var(--line);
  }
  .pager a {
    flex: 1;
    padding: 18px 22px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--white);
    color: var(--slate);
    transition: border-color 0.2s, background 0.2s;
  }
  .pager a:hover {
    border-color: var(--clay);
    background: var(--white);
    color: var(--slate);
  }
  .pager a.next { text-align: right; }
  .pager-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .pager-title {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 17px;
    color: var(--navy);
  }

  .loading {
    color: var(--muted);
    font-style: italic;
    padding: 40px 0;
  }
  .error {
    background: #fff5f0;
    border: 1px solid var(--clay);
    padding: 20px;
    border-radius: 6px;
    color: var(--navy);
  }

  /* Mobile */
  .mobile-header {
    display: none;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--navy);
    color: var(--ivory);
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    align-items: center;
    justify-content: space-between;
  }
  .mobile-brand {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    color: var(--ivory);
  }
  .mobile-menu-btn {
    background: rgba(255,255,255,0.1);
    color: var(--ivory);
    border: none;
    padding: 8px 14px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  @media (max-width: 1024px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 300px;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 20;
      padding: 24px 24px 40px 24px;
    }
    .sidebar.open { transform: translateX(0); }
    .mobile-header { display: flex; }
    main { padding: 40px 24px 80px 24px; }
    .hero-headline { font-size: 44px; }
    .hero-sub { font-size: 17px; }
    .content h1 { font-size: 36px; }
    .content h2 { font-size: 26px; }
    .content h3 { font-size: 20px; }
    .card-grid { grid-template-columns: 1fr; }
    .pager { flex-direction: column; }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(14,30,63,0.5);
      z-index: 15;
    }
    .overlay.open { display: block; }
  }

  @media (max-width: 520px) {
    main { padding: 32px 18px 60px 18px; }
    .hero-headline { font-size: 34px; }
    .content table { display: block; overflow-x: auto; font-size: 13.5px; }
  }
</style>
</head>
<body>

<div class="mobile-header">
  <span class="mobile-brand">Success Mpowered</span>
  <button class="mobile-menu-btn" id="menuBtn">Menu</button>
</div>
<div class="overlay" id="overlay"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1 class="brand-mark">Success Mpowered</h1>
      <div class="brand-sub">Redesign Strategy</div>
    </div>

    <div class="nav-label">Deliverables</div>
    <ul class="nav-list" id="navList"></ul>

    <div class="sidebar-footer">
      A strategic redesign pack covering positioning, sitemap, copy, design direction, conversion, SEO, and team.
      <br><br>
      <a href="https://www.successmpowered.com" target="_blank" rel="noopener">Current site →</a>
    </div>
  </aside>

  <main>
    <div id="content" class="content">
      <div class="loading">Loading…</div>
    </div>
  </main>
</div>

<script>
  const PAGES = [
    { num: '00', slug: '00-overview', file: '00-overview.md',
      title: 'Overview',
      desc: 'Executive summary, top strategic moves, and how to read the pack.' },
    { num: '01', slug: '01-audit', file: '01-audit.md',
      title: 'Website Audit',
      desc: 'Deep review across positioning, messaging, UX, trust, and content.' },
    { num: '02', slug: '02-positioning', file: '02-positioning.md',
      title: 'Strategic Positioning',
      desc: 'Value proposition, audience segments, messaging pillars, differentiation.' },
    { num: '03', slug: '03-sitemap', file: '03-sitemap.md',
      title: 'Sitemap',
      desc: 'Recommended site structure, page purpose, and phased rollout.' },
    { num: '04', slug: '04-homepage', file: '04-homepage.md',
      title: 'Homepage Redesign',
      desc: 'Full section-by-section homepage rebuild with copy.' },
    { num: '05', slug: '05-core-pages', file: '05-core-pages.md',
      title: 'Core Pages Copy',
      desc: 'Rewritten copy for Services, Approach, About, Insights, Contact.' },
    { num: '06', slug: '06-design-direction', file: '06-design-direction.md',
      title: 'Design Direction',
      desc: 'Editorial visual language — typography, palette, imagery, references.' },
    { num: '07', slug: '07-conversion', file: '07-conversion.md',
      title: 'Conversion',
      desc: 'Three-tier commitment ladder, qualifying intake, trust, and nurture.' },
    { num: '08', slug: '08-seo-messaging', file: '08-seo-messaging.md',
      title: 'SEO & Messaging',
      desc: 'Keyword territories, content calendar, voice rules, meta tags.' },
    { num: '09', slug: '09-team-restructure', file: '09-team-restructure.md',
      title: 'Team Restructure',
      desc: 'Partner + faculty model, bios for Christopher and Aditi, associates.' }
  ];

  const navList = document.getElementById('navList');
  const content = document.getElementById('content');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const menuBtn = document.getElementById('menuBtn');

  // Build nav
  function buildNav() {
    const homeItem = document.createElement('li');
    homeItem.innerHTML = `<button class="nav-item" data-slug="home"><span class="nav-num">—</span><span>Start here</span></button>`;
    navList.appendChild(homeItem);

    PAGES.forEach(p => {
      const li = document.createElement('li');
      li.innerHTML = `<button class="nav-item" data-slug="${p.slug}"><span class="nav-num">${p.num}</span><span>${p.title}</span></button>`;
      navList.appendChild(li);
    });

    navList.addEventListener('click', e => {
      const btn = e.target.closest('.nav-item');
      if (!btn) return;
      const slug = btn.dataset.slug;
      navigateTo(slug);
      if (window.innerWidth <= 1024) closeSidebar();
    });
  }

  function setActive(slug) {
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.slug === slug);
    });
  }

  // Home view
  function renderHome() {
    document.title = 'Success Mpowered — Website Redesign Strategy';
    const cards = PAGES.map(p => `
      <a class="card" href="#${p.slug}" data-slug="${p.slug}">
        <div class="card-num">${p.num}</div>
        <h3 class="card-title">${p.title}</h3>
        <p class="card-desc">${p.desc}</p>
      </a>
    `).join('');

    content.innerHTML = `
      <div class="eyebrow">Strategy Pack · 2026</div>
      <div class="hero">
        <h1 class="hero-headline">A redesign that matches <em>the business</em> underneath it.</h1>
        <p class="hero-sub">A full strategic redesign for Success Mpowered — positioning, sitemap, copy, visual direction, conversion, SEO, and team. Ten documents, written to brief a designer and developer directly.</p>
      </div>

      <div class="meta-row">
        <div><strong>Subject:</strong> successmpowered.com</div>
        <div><strong>Scope:</strong> Full redesign</div>
        <div><strong>Format:</strong> Strategy pack</div>
      </div>

      <h2 style="border-top:none; padding-top:0; margin-top:56px;">The pack</h2>
      <p>Each document is standalone. Read <strong>00 Overview</strong> first for the executive summary and recommended reading order.</p>

      <div class="card-grid">${cards}</div>

      <h2>How to read this</h2>
      <ul>
        <li><strong>Start with 00 Overview</strong> for the high-level summary and the brand-name decision point.</li>
        <li><strong>01 Audit → 02 Positioning</strong> gives the full strategic narrative — what's wrong today, what to build instead.</li>
        <li><strong>03 → 05</strong> are the executional blueprint — sitemap, homepage, core pages.</li>
        <li><strong>06 → 09</strong> cover the supporting systems — design direction, conversion, SEO, team.</li>
      </ul>

      <p style="margin-top:40px;"><a href="#00-overview">Start with the overview →</a></p>
    `;

    content.querySelectorAll('.card').forEach(c => {
      c.addEventListener('click', e => {
        e.preventDefault();
        navigateTo(c.dataset.slug);
      });
    });

    setActive('home');
    window.scrollTo(0, 0);
  }

  async function renderPage(slug) {
    const idx = PAGES.findIndex(p => p.slug === slug);
    if (idx === -1) { renderHome(); return; }
    const page = PAGES[idx];

    document.title = `${page.num} · ${page.title} — Success Mpowered`;
    content.innerHTML = `<div class="loading">Loading ${page.title}…</div>`;
    setActive(slug);

    try {
      const res = await fetch(page.file + '?v=' + Date.now());
      if (!res.ok) throw new Error(`Failed to load ${page.file} (${res.status})`);
      const md = await res.text();
      const html = marked.parse(md);

      const prev = idx > 0 ? PAGES[idx - 1] : null;
      const next = idx < PAGES.length - 1 ? PAGES[idx + 1] : null;

      const pagerHtml = `
        <div class="pager">
          ${prev ? `<a href="#${prev.slug}" data-slug="${prev.slug}"><span class="pager-label">← Previous</span><span class="pager-title">${prev.num} · ${prev.title}</span></a>` : '<span></span>'}
          ${next ? `<a class="next" href="#${next.slug}" data-slug="${next.slug}"><span class="pager-label">Next →</span><span class="pager-title">${next.num} · ${next.title}</span></a>` : '<span></span>'}
        </div>
      `;

      content.innerHTML = `
        <div class="eyebrow">Document ${page.num}</div>
        ${html}
        ${pagerHtml}
      `;

      content.querySelectorAll('.pager a[data-slug]').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          navigateTo(a.dataset.slug);
        });
      });

      window.scrollTo(0, 0);
    } catch (err) {
      content.innerHTML = `<div class="error"><strong>Could not load this document.</strong><br>${err.message}<br><br>If you're viewing this locally by opening the file directly, browsers block fetch() on file:// URLs. Serve via GitHub Pages or a local server (e.g. <code>python -m http.server</code>).</div>`;
    }
  }

  function navigateTo(slug) {
    if (slug === 'home') {
      history.pushState({}, '', '#');
      renderHome();
    } else {
      history.pushState({}, '', '#' + slug);
      renderPage(slug);
    }
  }

  function handleRoute() {
    const hash = window.location.hash.replace('#', '');
    if (!hash || hash === 'home') renderHome();
    else renderPage(hash);
  }

  // Mobile menu
  function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('open'); }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }
  menuBtn.addEventListener('click', openSidebar);
  overlay.addEventListener('click', closeSidebar);

  // Init
  buildNav();
  window.addEventListener('popstate', handleRoute);
  handleRoute();
</script>
</body>
</html>
